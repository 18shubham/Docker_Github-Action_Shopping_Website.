# =============================================================
# ShopDock CI/CD Pipeline
# =============================================================
# This workflow runs on every push to main and on pull requests.
# It builds Docker images, runs security scans, and pushes
# images to Docker Hub.
# =============================================================

name: ShopDock CI/CD Pipeline

# ── TRIGGERS ─────────────────────────────────────────────────
# WHEN should this pipeline run?
on:
  push:
    branches: [main]          # Every push to main branch
  pull_request:
    branches: [main]          # Every PR targeting main

# ── JOBS ─────────────────────────────────────────────────────
jobs:

  # ── JOB 1: Build & Test ────────────────────────────────────
  # Purpose: Make sure the Docker images build successfully
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest    # GitHub gives us a free Ubuntu VM

    steps:
      # Step 1: Download our code into the VM
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (advanced builder)
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build backend image
      - name: 🏗️ Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false                    # Don't push yet, just build
          tags: shubham3023/shopdock-api:test
          cache-from: type=gha           # Use GitHub's build cache
          cache-to: type=gha,mode=max

      # Step 4: Build frontend image
      - name: 🏗️ Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: shubham3023/shopdock-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 5: Verify builds succeeded
      - name: ✅ Build Verification
        run: echo "Both images built successfully!"

  # ── JOB 2: Push to Docker Hub ──────────────────────────────
  # Purpose: Push images to Docker Hub (only on main branch)
  # This job DEPENDS on the build job passing first
  push:
    name: 📦 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build                         # Wait for build job to pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # ↑ Only push on actual pushes to main, NOT on pull requests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub using our SECRETS
      # These secrets are encrypted — nobody can see them
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Push backend with two tags:
      # 1. "latest" — always points to newest build
      # 2. The Git SHA — unique identifier for this exact commit
      - name: 🚀 Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true                     # Actually push this time!
          tags: |
            shubham3023/shopdock-api:latest
            shubham3023/shopdock-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            shubham3023/shopdock-frontend:latest
            shubham3023/shopdock-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📋 Summary
        run: |
          echo "✅ Images pushed to Docker Hub!"
          echo ""
          echo "Backend:  docker pull shubham3023/shopdock-api:latest"
          echo "Frontend: docker pull shubham3023/shopdock-frontend:latest"
          echo ""
          echo "Tagged with commit: ${{ github.sha }}"

  # ── JOB 3: Security Scan ───────────────────────────────────
  # Purpose: Scan images for known vulnerabilities (CVEs)
  # Runs AFTER push so we scan the actual production images
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build                         # Run after build passes

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Build the backend image locally for scanning
      - name: 🏗️ Build Backend for Scan
        run: docker build -t shopdock-api:scan ./backend

      # Scan with Trivy — the industry-standard vulnerability scanner
      - name: 🔍 Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'shopdock-api:scan'
          format: 'table'
          exit-code: '0'                 # Don't fail the build (for now)
          severity: 'CRITICAL,HIGH'      # Only show serious issues

      - name: 🏗️ Build Frontend for Scan
        run: docker build -t shopdock-frontend:scan ./frontend

      - name: 🔍 Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'shopdock-frontend:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
