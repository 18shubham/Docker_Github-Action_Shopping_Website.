server {
    # Listen on port 80 — standard HTTP port
    # Matches "80:80" in docker-compose.yml ports section
    listen 80;

    # Allow file uploads up to 10MB
    # Default is 1MB — too small for product images
    # Without this: 413 error on image upload
    client_max_body_size 10M;

    # ── React Frontend ──────────────────────────────
    # Catch-all location — handles all URLs by default
    # Forwards to frontend container running Nginx on port 80
    location / {
        proxy_pass http://frontend:80;
        # Pass original hostname so frontend knows the domain
        proxy_set_header Host $host;
        # Pass real user IP — not Nginx's internal IP
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Node.js API ─────────────────────────────────
    # More specific than / so takes priority for /api/* routes
    # Handles: /api/products, /api/auth, /api/orders etc.
    location /api {
        proxy_pass http://api:3000;
        # HTTP 1.1 required for WebSocket (Socket.io) support
        # HTTP 1.0 cannot upgrade to WebSocket connection
        proxy_http_version 1.1;
        # These two headers allow WebSocket handshake
        # Without them: real-time stock updates won't work
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── MinIO Product Images ─────────────────────────
    # Serves product images stored in MinIO
    # /uploads/photo.jpg → minio:9000/products/photo.jpg
    # Users see clean URLs — never know about MinIO
    location /uploads {
        proxy_pass http://minio:9000/products;
        proxy_set_header Host $host;
    }
}
